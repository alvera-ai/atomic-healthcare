# Watchman config — repurposed as a patient identity index (EMPI), not sanctions.
# We load NO government lists (IncludedLists empty) and instead ingest our own
# patients as a Senzing-JSONL file. Mirrors the atomic-fi custom-list pattern.
# Mounted to /app/config.yml; selected via APP_CONFIG. Verified for moov/watchman:v0.61.1.
Watchman:
  Servers:
    BindAddress: ":8084"
    AdminAddress: ":9094"

  Telemetry:
    ServiceName: "watchman"

  Webui:
    BasePath: "/"

  Download:
    RefreshInterval: "12h"
    InitialDataDirectory: "/data"
    # Patient EMPI only — do not download OFAC/CSL/etc.
    IncludedLists: []

    # Our patients are loaded as an in-memory Senzing list — the SAME pathway
    # Watchman uses for OFAC/UN CSL and that atomic-fi uses to onboard a country.
    # NOT the Ingest.Files path: that one is Postgres-backed (NewRepository falls
    # back to an in-memory MockRepository when no Database is configured, and that
    # repo is never wired into the search index → "0 entities", which is the bug
    # we hit). With no Location, Watchman matches each SourceList to a file in
    # InitialDataDirectory whose *basename equals the SourceList exactly*
    # (download/client.go GetFiles → EqualFold(filepath.Base(file), name)).
    # So the mount target MUST be /data/atomic_patients (bare, no extension).
    Senzing:
      - SourceList: atomic_patients

  Search:
    Goroutines:
      Default: 10
      Min: 1
      Max: 25

  Geocoding:
    Enabled: false
